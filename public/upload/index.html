<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elena — Upload Documents</title>
  <link rel="icon" type="image/png" href="../images/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #fff;
      background: #0a0a0a;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ========== BACKGROUND ========== */
    .hero-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: linear-gradient(135deg, #0F1B3D 0%, #1A3A6E 30%, #2E6BB5 60%, #2E6BB5 100%);
    }

    .hero-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 85% 130%, #F4B084 0%, #E8956D 25%, rgba(46, 107, 181, 0) 60%);
    }

    .hero-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 3;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      opacity: 0.12;
      mix-blend-mode: overlay;
      pointer-events: none;
    }

    .hero-blobs {
      position: fixed;
      inset: 0;
      z-index: 1;
      overflow: hidden;
      pointer-events: none;
    }

    .hero-blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
    }

    .hero-blob-1 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(46, 107, 181, 0.5) 0%, transparent 70%); top: -10%; left: 20%; }
    .hero-blob-2 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(244, 176, 132, 0.35) 0%, transparent 70%); bottom: -20%; right: -5%; }
    .hero-blob-3 { width: 400px; height: 400px; background: radial-gradient(circle, rgba(26, 58, 110, 0.4) 0%, transparent 70%); top: 30%; right: 25%; }

    /* ========== NAV ========== */
    nav {
      position: relative;
      z-index: 10;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-logo {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(40px) saturate(1.8);
      -webkit-backdrop-filter: blur(40px) saturate(1.8);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-top-color: rgba(255, 255, 255, 0.3);
      border-radius: 18px 18px 18px 4px;
      padding: 10px 20px;
      font-size: 1.35rem;
      font-weight: 600;
      color: #fff;
      text-decoration: none;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.15);
    }

    .nav-cta {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(40px) saturate(1.8);
      -webkit-backdrop-filter: blur(40px) saturate(1.8);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 100px;
      padding: 10px 24px;
      color: rgba(255, 255, 255, 0.85);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 400;
      transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
    }

    .nav-cta:hover { background: rgba(255, 255, 255, 0.15); color: #fff; }

    /* ========== PAGE ========== */
    .page {
      position: relative;
      z-index: 5;
      display: flex;
      justify-content: center;
      padding: 20px 24px 80px;
    }

    .container {
      width: 100%;
      max-width: 440px;
    }

    /* ========== AUTH ========== */
    .auth-section { display: block; }
    .app-section { display: none; }

    h1 {
      font-size: clamp(1.8rem, 4vw, 2.2rem);
      font-weight: 300;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    h1 em {
      font-style: italic;
      font-family: 'DM Serif Display', Georgia, serif;
      font-weight: 400;
    }

    .subtitle {
      font-size: 0.95rem;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.6);
      margin-bottom: 32px;
      line-height: 1.5;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.45);
      margin-bottom: 6px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 16px 24px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(40px) saturate(1.8);
      -webkit-backdrop-filter: blur(40px) saturate(1.8);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-top-color: rgba(255, 255, 255, 0.3);
      border-radius: 100px;
      font-size: 0.95rem;
      font-family: inherit;
      font-weight: 400;
      color: #fff;
      outline: none;
      margin-bottom: 12px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.12);
      transition: background 0.2s, border-color 0.2s;
    }

    input::placeholder { color: rgba(255, 255, 255, 0.4); }
    input:focus { background: rgba(255, 255, 255, 0.15); border-color: rgba(255, 255, 255, 0.4); }

    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 100px;
      font-size: 0.95rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary {
      background: #fff;
      color: #0F1B3D;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
    }

    .btn-primary:hover:not(:disabled) { opacity: 0.92; }

    .btn-oauth {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 15px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-top-color: rgba(255, 255, 255, 0.25);
      border-radius: 100px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(40px) saturate(1.8);
      -webkit-backdrop-filter: blur(40px) saturate(1.8);
      font-size: 0.9rem;
      font-weight: 400;
      font-family: inherit;
      color: rgba(255, 255, 255, 0.9);
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.1);
      transition: all 0.2s;
    }

    .btn-oauth:hover { background: rgba(255, 255, 255, 0.12); color: #fff; }

    .divider { display: flex; align-items: center; gap: 14px; margin: 24px 0; }
    .divider-line { flex: 1; height: 1px; background: rgba(255, 255, 255, 0.1); }
    .divider-text { font-size: 0.8rem; color: rgba(255, 255, 255, 0.3); font-weight: 300; }

    .error-msg { color: #FF8A80; font-size: 0.85rem; margin-bottom: 14px; display: none; font-weight: 400; }
    .error-msg.visible { display: block; }

    /* ========== UPLOAD ========== */
    .drop-zone {
      border: 2px dashed rgba(255, 255, 255, 0.15);
      border-radius: 20px;
      padding: 44px 24px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 20px;
    }

    .drop-zone:hover, .drop-zone.dragover {
      border-color: rgba(255, 255, 255, 0.4);
      background: rgba(255, 255, 255, 0.04);
    }

    .drop-zone-icon { font-size: 1.8rem; margin-bottom: 10px; }
    .drop-zone-text { font-size: 0.9rem; color: rgba(255, 255, 255, 0.5); font-weight: 300; }
    .drop-zone-text strong { color: #fff; font-weight: 500; }
    .formats { font-size: 0.75rem; color: rgba(255, 255, 255, 0.25); margin-top: 8px; }

    .file-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

    .file-item {
      display: flex; align-items: center; gap: 12px; padding: 14px 16px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 14px;
    }

    .file-icon { font-size: 1rem; }
    .file-info { flex: 1; min-width: 0; }
    .file-name { font-size: 0.85rem; font-weight: 500; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-status { font-size: 0.75rem; color: rgba(255, 255, 255, 0.4); margin-top: 2px; }
    .file-status.success { color: #69F0AE; }
    .file-status.error { color: #FF8A80; }
    .file-status.processing { color: rgba(255, 255, 255, 0.7); }

    .progress-bar { height: 3px; background: rgba(255, 255, 255, 0.1); border-radius: 2px; margin-top: 6px; overflow: hidden; }
    .progress-fill { height: 100%; background: #fff; border-radius: 2px; transition: width 0.3s; }

    .user-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
    .user-email { font-size: 0.85rem; color: rgba(255, 255, 255, 0.45); font-weight: 300; }
    .sign-out { background: none; border: none; font-size: 0.85rem; color: rgba(255, 255, 255, 0.45); cursor: pointer; font-family: inherit; text-decoration: underline; font-weight: 300; }
    .sign-out:hover { color: #fff; }

    .existing-docs { margin-top: 32px; padding-top: 24px; border-top: 1px solid rgba(255, 255, 255, 0.08); }
    .existing-docs h2 { font-size: 1rem; font-weight: 500; margin-bottom: 14px; }

    .doc-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
    .doc-title { font-size: 0.85rem; font-weight: 500; }
    .doc-type { font-size: 0.75rem; color: rgba(255, 255, 255, 0.4); text-transform: capitalize; }
    .doc-date { font-size: 0.75rem; color: rgba(255, 255, 255, 0.25); margin-left: auto; }
    .empty-docs { font-size: 0.85rem; color: rgba(255, 255, 255, 0.3); text-align: center; padding: 20px; font-weight: 300; }

    @media (max-width: 500px) {
      nav { padding: 16px 16px; }
      .container { padding: 0 4px; }
    }
  </style>
</head>
<body>

<div class="hero-bg"></div>
<div class="hero-blobs">
  <div class="hero-blob hero-blob-1"></div>
  <div class="hero-blob hero-blob-2"></div>
  <div class="hero-blob hero-blob-3"></div>
</div>

<nav>
  <a href="../" class="nav-logo">elena</a>
  <a href="../" class="nav-cta">Back to home</a>
</nav>

<div class="page">
  <div class="container">

    <!-- Auth -->
    <div class="auth-section" id="auth-section">
      <h1>Upload your <em>documents</em></h1>
      <p class="subtitle">Sign in to upload medical documents, EOBs, lab results, and more to your Elena account.</p>

      <div class="error-msg" id="auth-error"></div>

      <button class="btn btn-oauth" onclick="handleGoogleSignIn()">
        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Continue with Google
      </button>

      <button class="btn btn-oauth" onclick="handleAppleSignIn()" style="margin-top: 10px;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M17.05 20.28c-.98.95-2.05.88-3.08.4-1.09-.5-2.08-.48-3.24 0-1.44.62-2.2.44-3.06-.4C2.79 15.25 3.51 7.59 9.05 7.31c1.35.07 2.29.74 3.08.8 1.18-.24 2.31-.93 3.57-.84 1.51.12 2.65.72 3.4 1.8-3.12 1.87-2.38 5.98.48 7.13-.57 1.5-1.31 2.99-2.54 4.09zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.32 2.32-2.12 4.45-3.74 4.25z"/></svg>
        Continue with Apple
      </button>

      <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">or email</span>
        <div class="divider-line"></div>
      </div>

      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email">

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Your password" autocomplete="current-password">

      <button class="btn btn-primary" id="sign-in-btn" onclick="handleSignIn()">Sign in</button>
    </div>

    <!-- App -->
    <div class="app-section" id="app-section">
      <div class="user-header">
        <span class="user-email" id="user-email"></span>
        <button class="sign-out" onclick="handleSignOut()">Sign out</button>
      </div>

      <h1>Upload <em>documents</em></h1>
      <p class="subtitle">Drag and drop or click to browse.</p>

      <div class="drop-zone" id="drop-zone" onclick="document.getElementById('file-input').click()">
        <div class="drop-zone-icon">📄</div>
        <div class="drop-zone-text"><strong>Choose files</strong> or drag them here</div>
        <div class="formats">PDF, JPEG, PNG, GIF, WebP, HEIC</div>
      </div>
      <input type="file" id="file-input" multiple accept=".pdf,.jpg,.jpeg,.png,.gif,.webp,.heic,.heif" style="display:none" onchange="handleFileSelect(event)">

      <div class="file-list" id="file-list"></div>

      <div class="existing-docs">
        <h2>Your documents</h2>
        <div id="doc-list"></div>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
  const SUPABASE_URL = 'https://livbrrqqxnvnxhggguig.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxpdmJycnFxeG52bnhoZ2dndWlnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE0Njc1MzYsImV4cCI6MjA4NzA0MzUzNn0.MkOKc7MWq5zoR3OY7wZgOsPwvjjKSij0ln1nF6inxP0';
  const API_BASE = 'https://elena-backend-production-production.up.railway.app';

  if (!window.supabase || !window.supabase.createClient) {
    document.getElementById('auth-error').textContent = 'Page failed to load. Please refresh.';
    document.getElementById('auth-error').classList.add('visible');
  }
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  let accessToken = null;

  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (session) { accessToken = session.access_token; showApp(session.user.email); }
  })();

  async function handleGoogleSignIn() {
    const { error } = await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin + '/upload/' } });
    if (error) { document.getElementById('auth-error').textContent = error.message; document.getElementById('auth-error').classList.add('visible'); }
  }

  async function handleAppleSignIn() {
    const { error } = await sb.auth.signInWithOAuth({ provider: 'apple', options: { redirectTo: window.location.origin + '/upload/' } });
    if (error) { document.getElementById('auth-error').textContent = error.message; document.getElementById('auth-error').classList.add('visible'); }
  }

  async function handleSignIn() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errEl = document.getElementById('auth-error');
    const btn = document.getElementById('sign-in-btn');
    if (!email || !password) { errEl.textContent = 'Please enter your email and password.'; errEl.classList.add('visible'); return; }
    btn.disabled = true; btn.textContent = 'Signing in...'; errEl.classList.remove('visible');
    try {
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      if (error) { errEl.textContent = error.message; errEl.classList.add('visible'); btn.disabled = false; btn.textContent = 'Sign in'; return; }
      accessToken = data.session.access_token; showApp(data.user.email);
    } catch (e) { errEl.textContent = e.message || 'Sign in failed.'; errEl.classList.add('visible'); btn.disabled = false; btn.textContent = 'Sign in'; }
  }

  async function handleSignOut() { await sb.auth.signOut(); accessToken = null; document.getElementById('auth-section').style.display = 'block'; document.getElementById('app-section').style.display = 'none'; }

  function showApp(email) { document.getElementById('auth-section').style.display = 'none'; document.getElementById('app-section').style.display = 'block'; document.getElementById('user-email').textContent = email; loadExistingDocs(); }

  const dropZone = document.getElementById('drop-zone');
  dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', (e) => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });

  function handleFileSelect(e) { handleFiles(e.target.files); e.target.value = ''; }
  async function handleFiles(fileList) { for (const file of fileList) await uploadFile(file); }

  async function uploadFile(file) {
    const listEl = document.getElementById('file-list');
    const id = 'file-' + Date.now() + Math.random().toString(36).slice(2);
    const item = document.createElement('div'); item.className = 'file-item'; item.id = id;
    item.innerHTML = `<span class="file-icon">📄</span><div class="file-info"><div class="file-name">${file.name}</div><div class="file-status processing">Uploading...</div><div class="progress-bar"><div class="progress-fill" style="width: 10%"></div></div></div>`;
    listEl.prepend(item);
    try {
      const urlRes = await fetch(`${API_BASE}/documents/upload-url`, { method: 'POST', headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ session_id: 'web-' + Date.now(), filename: file.name }) });
      if (!urlRes.ok) throw new Error('Failed to get upload URL');
      const { upload_url, key, content_type, required_headers } = await urlRes.json();
      updateFileStatus(id, 'Uploading...', 'processing', 40);
      const uploadRes = await fetch(upload_url, { method: 'PUT', headers: { 'Content-Type': content_type, ...(required_headers || {}) }, body: file });
      if (!uploadRes.ok) throw new Error('Upload failed');
      updateFileStatus(id, 'Processing...', 'processing', 70);
      const docRes = await fetch(`${API_BASE}/structured-documents/upload`, { method: 'POST', headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ s3_key: key, filename: file.name, content_type: file.type || 'application/octet-stream', care_visit_id: null }) });
      if (!docRes.ok) { const e = await docRes.json().catch(() => ({})); throw new Error(e.detail || 'Processing failed'); }
      const result = await docRes.json();
      updateFileStatus(id, `${result.document.doc_title || file.name} (${result.document.doc_type.replace(/_/g, ' ')})`, 'success', 100);
      loadExistingDocs();
    } catch (err) { updateFileStatus(id, err.message, 'error', 0); }
  }

  function updateFileStatus(id, text, cls, progress) {
    const el = document.getElementById(id); if (!el) return;
    el.querySelector('.file-status').textContent = text;
    el.querySelector('.file-status').className = 'file-status ' + cls;
    const fill = el.querySelector('.progress-fill');
    if (progress > 0) fill.style.width = progress + '%'; else fill.parentElement.style.display = 'none';
    if (cls === 'success' || cls === 'error') setTimeout(() => { fill.parentElement.style.display = 'none'; }, 1000);
  }

  async function loadExistingDocs() {
    const listEl = document.getElementById('doc-list');
    try {
      const res = await fetch(`${API_BASE}/structured-documents?profile_only=true`, { headers: { 'Authorization': `Bearer ${accessToken}` } });
      if (!res.ok) return;
      const docs = await res.json();
      if (!docs.length) { listEl.innerHTML = '<div class="empty-docs">No documents yet.</div>'; return; }
      listEl.innerHTML = docs.map(d => `<div class="doc-row"><span class="file-icon">📄</span><div><div class="doc-title">${d.doc_title || d.filename}</div><div class="doc-type">${d.doc_type.replace(/_/g, ' ')}</div></div><span class="doc-date">${d.created_at.slice(0, 10)}</span></div>`).join('');
    } catch { listEl.innerHTML = '<div class="empty-docs">Could not load documents.</div>'; }
  }

  document.getElementById('password').addEventListener('keydown', (e) => { if (e.key === 'Enter') handleSignIn(); });
</script>

</body>
</html>
