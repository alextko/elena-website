<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're invited to Elena</title>
  <meta name="description" content="Someone invited you to connect on Elena — your AI-powered healthcare assistant.">
  <meta property="og:title" content="You're invited to join a family on Elena">
  <meta property="og:description" content="Connect with your family on Elena to manage healthcare together.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://www.elena-health.com/invite">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0B1A3B;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      max-width: 420px;
      width: 90%;
      text-align: center;
      padding: 48px 32px;
    }
    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 36px;
      color: #F5F0E8;
      margin-bottom: 32px;
    }
    .icon-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 36px;
    }
    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      font-weight: 400;
      color: #F5F0E8;
      margin-bottom: 12px;
      line-height: 1.3;
    }
    p {
      font-size: 16px;
      line-height: 1.6;
      color: rgba(245, 240, 232, 0.7);
      margin-bottom: 32px;
    }
    .btn {
      display: inline-block;
      width: 100%;
      padding: 18px 32px;
      border-radius: 30px;
      font-size: 17px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      border: none;
      text-align: center;
    }
    .btn-primary {
      background: #F5F0E8;
      color: #0B1A3B;
      margin-bottom: 12px;
    }
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      color: #F5F0E8;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .btn:hover {
      opacity: 0.9;
    }
    .footer-note {
      margin-top: 24px;
      font-size: 13px;
      color: rgba(245, 240, 232, 0.4);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Elena</div>
    <div class="icon-circle">&#x1F91D;</div>
    <h1>You've been invited to connect on Elena</h1>
    <p>
      A family member wants to connect with you on Elena so you can manage healthcare together. Open the app to accept, or download Elena to get started.
    </p>
    <a id="open-app" class="btn btn-primary" href="#">Open in Elena</a>
    <a class="btn btn-secondary" href="https://testflight.apple.com/join/8Y7ZwXYk">Download Elena</a>
    <p class="footer-note">Elena — Put Healthcare on Autopilot</p>
  </div>

  <script>
    // Extract invite code from URL path: /invite/ELENA-XXXXXX
    const path = window.location.pathname;
    const match = path.match(/\/invite\/([A-Z0-9-]+)/i);
    const code = match ? match[1] : null;

    const openBtn = document.getElementById('open-app');

    if (code) {
      const deepLink = 'elenaapp://invite/' + code;
      openBtn.href = deepLink;

      // Try to open the app automatically on mobile
      if (/iPhone|iPad|iPod/i.test(navigator.userAgent)) {
        window.location.href = deepLink;
        // If the app doesn't open after a short delay, the page stays visible
      }
    } else {
      openBtn.href = 'https://testflight.apple.com/join/8Y7ZwXYk';
      openBtn.textContent = 'Download Elena';
    }
  </script>
</body>
</html>
